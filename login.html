<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f3dfcf, #f7d6e0);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #fff5ec;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

.login-box h2 {
  color: #e89ab7; /* SOFT PINK FIX */
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #f0c6d6;
  border-radius: 12px;
  background: #fffaf6;
  outline: none;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #e89ab7; /* SOFT PINK FIX */
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.login-box button:hover {
  background: #d97fa4;
}

.login-box p {
  font-size: 12px;
  color: #8b6f63;
  margin-top: 15px;
}

.login-box a {
  color: #e89ab7;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Welcome Back 💗</h2>

  <input id="nama" type="text" placeholder="Masukkan Nama">
<input id="password" type="password" placeholder="Masukkan Password">

<button onclick="login()">Login</button>

  <p>Belum punya akun? <a href="register.html">Daftar</a></p>
</div>

<script>
function login() {

    let nama = document.getElementById("nama").value.trim();
    let password = document.getElementById("password").value.trim();

    if (nama === "") {
        alert("Nama wajib diisi!");
        return;
    }

    if (password === "") {
        alert("Password wajib diisi!");
        return;
    }

    // Simpan nama user
    localStorage.setItem("user", nama);

    alert("Login berhasil 🎉");
window.location.href = "landing.html";
}
</script>

</body>
</html>
